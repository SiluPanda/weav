syntax = "proto3";

package weav.v1;

service WeavService {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc CreateGraph(CreateGraphRequest) returns (CreateGraphResponse);
  rpc DropGraph(DropGraphRequest) returns (DropGraphResponse);
  rpc ListGraphs(ListGraphsRequest) returns (ListGraphsResponse);
  rpc GraphInfo(GraphInfoRequest) returns (GraphInfoResponse);
  rpc AddNode(AddNodeRequest) returns (AddNodeResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc UpdateNode(UpdateNodeRequest) returns (UpdateNodeResponse);
  rpc DeleteNode(DeleteNodeRequest) returns (DeleteNodeResponse);
  rpc AddEdge(AddEdgeRequest) returns (AddEdgeResponse);
  rpc InvalidateEdge(InvalidateEdgeRequest) returns (InvalidateEdgeResponse);
  rpc ContextQuery(ContextQueryRequest) returns (ContextQueryResponse);
  rpc BulkAddNodes(BulkAddNodesRequest) returns (BulkAddNodesResponse);
  rpc BulkAddEdges(BulkAddEdgesRequest) returns (BulkAddEdgesResponse);
  rpc ContextQueryStream(ContextQueryRequest) returns (stream ContextChunkProto);
  rpc SubscribeEvents(SubscribeEventsRequest) returns (stream GraphEventProto);
  rpc Snapshot(SnapshotRequest) returns (SnapshotResponse);
  rpc Info(InfoRequest) returns (InfoResponse);
}

message PingRequest {}
message PingResponse {
  string message = 1;
}

message CreateGraphRequest {
  string name = 1;
  ScopeRefProto scope = 2;
}
message CreateGraphResponse {}

message DropGraphRequest {
  string name = 1;
  ScopeRefProto scope = 2;
}
message DropGraphResponse {}

message ListGraphsRequest {}
message ListGraphsResponse {
  repeated string names = 1;
}

message GraphInfoRequest {
  string name = 1;
  ScopeRefProto scope = 2;
}
message GraphInfoResponse {
  string name = 1;
  uint64 node_count = 2;
  uint64 edge_count = 3;
}

message Property {
  string key = 1;
  string value_json = 2;
}

message AddNodeRequest {
  string graph = 1;
  string label = 2;
  repeated Property properties = 3;
  repeated float embedding = 4;
  string entity_key = 5;
  ScopeRefProto scope = 6;
}
message AddNodeResponse {
  uint64 node_id = 1;
}

message GetNodeRequest {
  string graph = 1;
  uint64 node_id = 2;
  ScopeRefProto scope = 3;
}
message GetNodeResponse {
  uint64 node_id = 1;
  string label = 2;
  repeated Property properties = 3;
}

message UpdateNodeRequest {
  string graph = 1;
  uint64 node_id = 2;
  repeated Property properties = 3;
  repeated float embedding = 4;
  ScopeRefProto scope = 5;
}
message UpdateNodeResponse {}

message DeleteNodeRequest {
  string graph = 1;
  uint64 node_id = 2;
  ScopeRefProto scope = 3;
}
message DeleteNodeResponse {}

message AddEdgeRequest {
  string graph = 1;
  uint64 source = 2;
  uint64 target = 3;
  string label = 4;
  float weight = 5;
  ScopeRefProto scope = 6;
}
message AddEdgeResponse {
  uint64 edge_id = 1;
}

message InvalidateEdgeRequest {
  string graph = 1;
  uint64 edge_id = 2;
  ScopeRefProto scope = 3;
}
message InvalidateEdgeResponse {}

message ContextQueryRequest {
  string graph = 1;
  string query = 2;
  repeated float embedding = 3;
  repeated string seed_nodes = 4;
  uint32 budget = 5;
  uint32 max_depth = 6;
  bool include_provenance = 7;
  RetrievalMode retrieval_mode = 8;
  RerankConfigProto rerank = 9;
  ScopeRefProto scope = 10;
}

enum RetrievalMode {
  RETRIEVAL_MODE_UNSPECIFIED = 0;
  RETRIEVAL_MODE_LOCAL = 1;
  RETRIEVAL_MODE_GLOBAL = 2;
  RETRIEVAL_MODE_HYBRID = 3;
  RETRIEVAL_MODE_DRIFT = 4;
}

message RerankConfigProto {
  optional bool enabled = 1;
  string provider = 2;
  string model = 3;
  optional uint32 candidate_limit = 4;
  optional float score_weight = 5;
}

message ScopeRefProto {
  string workspace_id = 1;
  string user_id = 2;
  string agent_id = 3;
  string session_id = 4;
}

message ContextChunkProto {
  uint64 node_id = 1;
  string content = 2;
  string label = 3;
  float relevance_score = 4;
  uint32 depth = 5;
  uint32 token_count = 6;
}

message ContextQueryResponse {
  repeated ContextChunkProto chunks = 1;
  uint32 total_tokens = 2;
  float budget_used = 3;
  uint32 nodes_considered = 4;
  uint32 nodes_included = 5;
  uint64 query_time_us = 6;
}

message BulkNodeItem {
  string label = 1;
  repeated Property properties = 2;
  repeated float embedding = 3;
  string entity_key = 4;
}

message BulkAddNodesRequest {
  string graph = 1;
  repeated BulkNodeItem nodes = 2;
  ScopeRefProto scope = 3;
}
message BulkAddNodesResponse {
  repeated uint64 ids = 1;
}

message BulkEdgeItem {
  uint64 source = 1;
  uint64 target = 2;
  string label = 3;
  float weight = 4;
}

message BulkAddEdgesRequest {
  string graph = 1;
  repeated BulkEdgeItem edges = 2;
  ScopeRefProto scope = 3;
}
message BulkAddEdgesResponse {
  repeated uint64 ids = 1;
}

message SubscribeEventsRequest {
  string graph = 1;
  uint64 since_sequence = 2;
  uint32 replay_limit = 3;
}

message GraphEventProto {
  uint64 sequence = 1;
  string graph = 2;
  uint64 timestamp_ms = 3;
  string kind = 4;
  string payload_json = 5;
}

message SnapshotRequest {}
message SnapshotResponse {
  bool success = 1;
  string message = 2;
}

message InfoRequest {}
message InfoResponse {
  string version = 1;
  uint64 uptime_seconds = 2;
  uint32 graph_count = 3;
  uint64 total_nodes = 4;
  uint64 total_edges = 5;
}
